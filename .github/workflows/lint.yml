name: Lint

on:
  push:
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/ruff-action@v3.6.1
        with:
          args: check --output-format=github
      - uses: astral-sh/ruff-action@v3.6.1
        with:
          args: format --check
